{{define "kanban_card.html"}}
<div class="kanban-card priority-{{.Priority}}" id="task-{{.ID}}" data-id="{{.ID}}">
    <div class="kanban-card-header">
        <span class="kanban-card-description" onclick="toggleKanbanCardEdit({{.ID}})">{{.Description}}</span>
        <button class="btn btn-sm btn-icon task-delete-btn"
            hx-delete="/api/tasks/{{.ID}}"
            hx-target="#task-{{.ID}}"
            hx-swap="outerHTML"
            hx-confirm="Delete this task?">&times;</button>
    </div>
    <div class="kanban-card-meta">
        <span class="priority-badge priority-{{.Priority}}">{{.Priority}}</span>
        {{if .DueDate}}
        <span class="due-date {{if .IsOverdue}}overdue{{end}}">{{.DueDate.Format "Jan 2"}}</span>
        {{end}}
    </div>
    {{if .Notes}}
    <div class="kanban-card-notes">{{.Notes}}</div>
    {{end}}
    <div id="kanban-card-edit-{{.ID}}" class="kanban-card-edit hidden">
        {{template "task_form.html" (dict "Task" . "KanbanForm" true)}}
    </div>
</div>
{{end}}
